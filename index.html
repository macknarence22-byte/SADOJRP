<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Andreas Department of Justice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-soft: rgba(201, 168, 76, 0.12);
            --gold-glow: rgba(201, 168, 76, 0.22);
            --navy: rgba(10, 18, 36, 0.55);
            --navy-deep: rgba(6, 12, 26, 0.70);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-border-gold: rgba(201, 168, 76, 0.22);
            --glass-shadow: 0 20px 56px rgba(0, 0, 0, 0.42);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: #fff;
            cursor: default;
        }

        /* ───── Background Video ───── */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            z-index: 0;
        }

        /* Gradient overlay for depth */
        .screen-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 38%, transparent 62%, rgba(0,0,0,0.52) 100%),
                linear-gradient(to right, rgba(0,0,0,0.32) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.20) 100%);
            pointer-events: none;
        }

        /* ───── Top Bar ───── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px 14px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.50) 0%, transparent 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .brand-emblem {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 1px solid var(--glass-border-gold);
            background:
                radial-gradient(circle at top left, rgba(201,168,76,0.18), transparent 48%),
                linear-gradient(135deg, rgba(201,168,76,0.09), rgba(10,18,36,0.60) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 18px rgba(201,168,76,0.12);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .brand-kicker {
            font-size: 9px;
            letter-spacing: 2.4px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.88;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.1px;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            background: rgba(10,10,14,0.38);
            backdrop-filter: blur(8px);
            font-size: 12px;
            color: rgba(255,255,255,0.72);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74,222,128,0.55);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.65; transform: scale(0.85); }
        }

        /* ───── Left Action Buttons ───── */
        .left-actions {
            position: fixed;
            left: 28px;
            bottom: 50%;
            transform: translateY(50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 42%),
                linear-gradient(135deg, rgba(201,168,76,0.06), rgba(10,18,36,0.55) 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.32);
            cursor: pointer;
            transition: transform 0.20s ease, border-color 0.20s ease, background 0.20s ease, box-shadow 0.20s ease;
        }

        .action-btn:hover {
            transform: translateX(3px);
            border-color: var(--glass-border-gold);
            background:
                radial-gradient(circle at top left, rgba(201,168,76,0.18), transparent 42%),
                linear-gradient(135deg, rgba(201,168,76,0.10), rgba(14,24,50,0.62) 100%);
            box-shadow: 0 10px 34px rgba(201,168,76,0.10);
        }

        .action-btn:active {
            transform: translateX(1px) scale(0.99);
        }

        .action-btn-icon {
            font-size: 16px;
            line-height: 1;
        }

        /* ───── Socials Panel ───── */
        .socials-panel {
            position: fixed;
            left: 28px;
            bottom: 50%;
            transform: translateY(50%) translateX(-18px);
            width: 320px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.30s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .socials-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(50%) translateX(0px);
        }

        .socials-shell {
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 36%),
                linear-gradient(135deg, rgba(201,168,76,0.05), rgba(10,18,36,0.70) 60%, rgba(5,8,18,0.80) 100%);
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.54);
        }

        .socials-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .socials-kicker {
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            opacity: 0.85;
            margin-bottom: 3px;
        }

        .socials-title {
            font-size: 19px;
            font-weight: 700;
            color: #fff;
        }

        .panel-close-btn {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.72);
            font-size: 17px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .panel-close-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            transform: scale(1.05);
        }

        .socials-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 11px 14px;
            border-radius: 11px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.82);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
        }

        .social-item:hover {
            transform: translateX(4px);
            border-color: var(--glass-border-gold);
            background: var(--gold-soft);
            color: #fff;
        }

        .social-item-icon {
            font-size: 15px;
            flex-shrink: 0;
        }

        /* ───── Team Panel (Modal) ───── */
        .team-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease, background 0.22s ease;
        }

        .team-overlay.open {
            opacity: 1;
            pointer-events: auto;
            background: rgba(0,0,0,0.62);
        }

        .team-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(980px, calc(100vw - 80px));
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.97);
            transition: opacity 0.24s ease, transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .team-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .panel-shell {
            padding: 26px 28px 22px;
            border-radius: 22px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 36%),
                linear-gradient(145deg, rgba(201,168,76,0.05), rgba(10,18,36,0.80) 58%, rgba(4,8,20,0.90) 100%);
            backdrop-filter: blur(16px);
            box-shadow: 0 36px 100px rgba(0,0,0,0.72);
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 16px;
        }

        .panel-kicker {
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .panel-title {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .panel-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.54);
            margin-top: 4px;
        }

        .panel-close {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 40%),
                rgba(10,18,36,0.40);
            color: rgba(255,255,255,0.80);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s ease, transform 0.18s ease, color 0.18s ease;
        }

        .panel-close:hover {
            background:
                radial-gradient(circle at top left, rgba(201,168,76,0.22), transparent 40%),
                rgba(14,24,50,0.55);
            color: #fff;
            transform: scale(1.06);
        }

        /* ───── Team Stage / Card Carousel ───── */
        .team-stage {
            position: relative;
            width: 100%;
            height: 520px;
            overflow: hidden;
            touch-action: none;
            cursor: grab;
        }

        .team-stage.dragging { cursor: grabbing; }

        .team-card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(320px, calc(100vw - 120px));
            height: 470px;
            padding: 20px 20px 18px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--member-hl-strong, rgba(255,255,255,0.08)) 0%, var(--member-hl-soft, rgba(255,255,255,0.00)) 52%),
                linear-gradient(180deg, rgba(22,26,38,0.96) 0%, rgba(12,15,26,0.98) 52%, rgba(6,8,16,1) 100%);
            box-shadow: 0 18px 44px rgba(0,0,0,0.38);
            overflow: hidden;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        .team-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255,255,255,0.035), rgba(255,255,255,0) 38%);
        }

        .card-top {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
        }

        .card-avatar {
            width: 68px;
            height: 68px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--glass-border-gold);
            box-shadow: 0 8px 22px rgba(0,0,0,0.32);
        }

        .card-head {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-top: 2px;
        }

        .card-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-role {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            opacity: 0.90;
        }

        .card-tag {
            display: inline-flex;
            width: fit-content;
            font-size: 10px;
            font-weight: 500;
            color: rgba(255,255,255,0.62);
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            letter-spacing: 0.4px;
        }

        .card-divider {
            position: relative;
            z-index: 2;
            height: 1px;
            background: linear-gradient(to right, var(--glass-border-gold), transparent 70%);
            margin-bottom: 14px;
        }

        .card-bio {
            position: relative;
            z-index: 2;
            font-size: 13px;
            line-height: 1.65;
            color: rgba(255,255,255,0.76);
            margin-bottom: 16px;
            min-height: 90px;
        }

        .card-meta {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 14px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .meta-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--gold);
            opacity: 0.68;
        }

        .meta-value {
            font-size: 12px;
            color: rgba(255,255,255,0.86);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ───── Team Controls ───── */
        .team-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 14px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid var(--glass-border-gold);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 42%),
                rgba(10,18,36,0.44);
            color: rgba(255,255,255,0.82);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s ease, transform 0.18s ease, color 0.18s ease;
        }

        .nav-btn:hover {
            background:
                radial-gradient(circle at top left, rgba(201,168,76,0.22), transparent 42%),
                rgba(14,24,50,0.55);
            color: #fff;
            transform: scale(1.06);
        }

        .nav-btn:active { transform: scale(0.97); }

        .team-dots {
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 80px;
            justify-content: center;
        }

        .team-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
            opacity: 0.65;
            cursor: pointer;
            transition: transform 0.22s ease, background 0.22s ease, opacity 0.22s ease;
        }

        .team-dot.active {
            background: var(--gold);
            opacity: 1;
            transform: scale(1.35);
        }

        /* ───── Music / Audio UI ───── */
        .music-ui {
            position: fixed;
            bottom: 22px;
            left: 28px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background:
                radial-gradient(circle at top left, var(--gold-soft), transparent 38%),
                linear-gradient(135deg, rgba(201,168,76,0.05), rgba(10,18,36,0.55) 60%, rgba(5,8,18,0.65) 100%);
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.38);
        }

        .music-cover {
            width: 44px;
            height: 44px;
            border-radius: 9px;
            object-fit: cover;
            border: 1px solid var(--glass-border-gold);
            flex-shrink: 0;
        }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .music-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.6px;
            color: var(--gold);
            opacity: 0.80;
        }

        .music-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .music-time {
            font-size: 11px;
            color: rgba(255,255,255,0.52);
        }

        .music-controls {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-left: 6px;
        }

        .pause-btn {
            padding: 5px 12px;
            border-radius: 7px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.78);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        }

        .pause-btn:hover {
            background: var(--gold-soft);
            border-color: var(--glass-border-gold);
            color: #fff;
        }

        .pause-btn.paused {
            color: var(--gold);
            border-color: var(--glass-border-gold);
            background: var(--gold-soft);
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vol-icon {
            font-size: 12px;
            color: rgba(255,255,255,0.44);
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            height: 4px;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            cursor: pointer;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(201,168,76,0.45);
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 13px;
            height: 13px;
            background: var(--gold);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        /* ───── Loading Bar ───── */
        .loading-bar-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 28px 14px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .loading-status {
            font-size: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.42);
        }

        .loading-track {
            width: 220px;
            height: 3px;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(to right, rgba(201,168,76,0.70), var(--gold));
            width: 0%;
            transition: width 0.35s ease;
            box-shadow: 0 0 8px rgba(201,168,76,0.40);
        }

        /* ───── Responsive ───── */
        @media (max-width: 900px) {
            .team-panel { width: calc(100vw - 40px); }
            .panel-shell { min-height: unset; }
            .team-stage { height: 490px; }
            .team-card { width: min(300px, calc(100vw - 90px)); height: 450px; }
        }

        @media (max-width: 640px) {
            .left-actions { left: 16px; }
            .socials-panel { left: 16px; width: calc(100vw - 32px); }
            .team-panel { width: calc(100vw - 22px); }
            .panel-shell { padding: 18px 16px 16px; }
            .team-stage { height: 450px; }
            .team-card { width: calc(100vw - 50px); height: 410px; }
            .music-ui { left: 16px; right: 16px; bottom: 18px; }
            .loading-bar-wrap { left: 16px; right: 16px; padding-bottom: 64px; }
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="disp/loading_screen/video.mp4" type="video/mp4">
    </video>

    <!-- Background Audio -->
    <audio id="bg-audio" autoplay loop preload="auto">
        <source src="disp/loading_screen/audio.mp3" type="audio/mpeg">
    </audio>

    <!-- Dim overlay -->
    <div class="screen-overlay"></div>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="brand">
            <div class="brand-emblem">⚖️</div>
            <div class="brand-text">
                <div class="brand-kicker">San Andreas</div>
                <div class="brand-name">Department of Justice</div>
            </div>
        </div>
        <div class="server-status">
            <div class="status-dot"></div>
            Server Online
        </div>
    </header>

    <!-- Left Action Buttons -->
    <div class="left-actions" id="leftActions">
        <button class="action-btn" id="socialsLaunch">
            <span class="action-btn-icon">🔗</span> Our Socials
        </button>
        <button class="action-btn" id="teamLaunch">
            <span class="action-btn-icon">👥</span> Our Team
        </button>
    </div>

    <!-- Socials Panel -->
    <section id="socialsPanel" class="socials-panel" aria-hidden="true">
        <div class="socials-shell">
            <div class="socials-header">
                <div>
                    <div class="socials-kicker">SA-DOJ Networks</div>
                    <div class="socials-title">Our Socials</div>
                </div>
                <button class="panel-close-btn" id="socialsClose" aria-label="Close socials">✕</button>
            </div>
            <div class="socials-list">
                <button class="social-item" type="button" data-url="https://sadoj.net">
                    <span class="social-item-icon">🌐</span>
                    <span>SA-DOJ Website</span>
                </button>
                <button class="social-item" type="button" data-url="https://discord.gg/sadoj">
                    <span class="social-item-icon">💬</span>
                    <span>SA-DOJ Discord</span>
                </button>
                <button class="social-item" type="button" data-url="https://www.youtube.com/@sadoj">
                    <span class="social-item-icon">▶️</span>
                    <span>SA-DOJ YouTube</span>
                </button>
                <button class="social-item" type="button" data-url="https://www.tiktok.com/@sadoj">
                    <span class="social-item-icon">🎵</span>
                    <span>SA-DOJ TikTok</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Team Overlay -->
    <div class="team-overlay" id="teamOverlay"></div>

    <!-- Team Panel -->
    <section id="teamPanel" class="team-panel" aria-hidden="true">
        <div class="panel-shell">
            <div class="panel-header">
                <div>
                    <div class="panel-kicker">SA-DOJ Management</div>
                    <div class="panel-title">Our Team</div>
                    <div class="panel-sub">Meet the founders and staff of San Andreas Department of Justice</div>
                </div>
                <button class="panel-close" id="teamClose" aria-label="Close team panel">✕</button>
            </div>
            <div id="teamStage" class="team-stage"></div>
            <div class="team-controls">
                <button id="teamPrev" class="nav-btn" aria-label="Previous">&#8592;</button>
                <div id="teamDots" class="team-dots"></div>
                <button id="teamNext" class="nav-btn" aria-label="Next">&#8594;</button>
            </div>
        </div>
    </section>

    <!-- Music UI -->
    <div class="music-ui">
        <img class="music-cover" src="disp/loading_screen/cover.png" alt="Album art" onerror="this.style.display='none'">
        <div class="music-info">
            <div class="music-label">Now Playing</div>
            <div class="music-title" id="musicTitle">Loading...</div>
            <div class="music-time" id="musicTime">—</div>
        </div>
        <div class="music-controls">
            <button class="pause-btn" id="pauseBtn">Pause</button>
            <div class="volume-wrap">
                <span class="vol-icon">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <!-- Loading Bar -->
    <div class="loading-bar-wrap">
        <div class="loading-status" id="loadingStatus">Connecting to server…</div>
        <div class="loading-track">
            <div class="loading-fill" id="loadingFill"></div>
        </div>
    </div>

    <!-- Inline Audio/Video Bootstrap -->
    <script>
    (function () {
        /* ── Audio ── */
        const audio = document.getElementById("bg-audio");
        const slider = document.getElementById("volumeSlider");
        const pauseBtn = document.getElementById("pauseBtn");
        const musicTitle = document.getElementById("musicTitle");
        const musicTime = document.getElementById("musicTime");

        audio.volume = 0.80;

        function formatTime(s) {
            if (!isFinite(s)) return "—";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, "0")}`;
        }

        function updatePauseBtn() {
            if (audio.paused) {
                pauseBtn.textContent = "Play";
                pauseBtn.classList.add("paused");
            } else {
                pauseBtn.textContent = "Pause";
                pauseBtn.classList.remove("paused");
            }
        }

        // Extract filename as track name
        function setTrackName() {
            const src = audio.currentSrc || audio.querySelector("source")?.src || "";
            const file = src.split("/").pop().replace(/\.[^.]+$/, "").replace(/[-_]/g, " ");
            musicTitle.textContent = file || "SA-DOJ Radio";
        }

        audio.addEventListener("loadedmetadata", () => {
            setTrackName();
        });

        audio.addEventListener("timeupdate", () => {
            if (!isFinite(audio.duration)) return;
            const remaining = audio.duration - audio.currentTime;
            musicTime.textContent = "Remaining: " + formatTime(remaining);
        });

        audio.addEventListener("play", updatePauseBtn);
        audio.addEventListener("pause", updatePauseBtn);
        audio.addEventListener("error", () => { musicTitle.textContent = "SA-DOJ Radio"; });

        pauseBtn.addEventListener("click", () => {
            if (audio.paused) {
                audio.play().catch(() => {});
            } else {
                audio.pause();
            }
        });

        slider.addEventListener("input", () => {
            audio.volume = slider.value / 100;
        });

        updatePauseBtn();
        setTrackName();

        /* ── Video: ensure it plays even on browsers that need a user gesture ── */
        const video = document.getElementById("bg-video");
        video.muted = true;
        video.play().catch(() => {
            document.addEventListener("click", () => video.play().catch(() => {}), { once: true });
        });

        /* ── Socials Panel ── */
        const socialsLaunch = document.getElementById("socialsLaunch");
        const socialsPanel = document.getElementById("socialsPanel");
        const socialsClose = document.getElementById("socialsClose");

        function openSocials() {
            closeTeam();
            socialsPanel.classList.add("open");
            socialsPanel.setAttribute("aria-hidden", "false");
        }

        function closeSocials() {
            socialsPanel.classList.remove("open");
            socialsPanel.setAttribute("aria-hidden", "true");
        }

        socialsLaunch.addEventListener("click", () => {
            socialsPanel.classList.contains("open") ? closeSocials() : openSocials();
        });

        socialsClose.addEventListener("click", closeSocials);

        document.querySelectorAll(".social-item").forEach((btn) => {
            btn.addEventListener("click", () => {
                const url = btn.getAttribute("data-url");
                if (!url) return;
                const a = document.createElement("a");
                a.href = url;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });

        /* ── Team panel open/close (delegated to index.js) ── */
        function closeTeam() {
            const panel = document.getElementById("teamPanel");
            const overlay = document.getElementById("teamOverlay");
            if (panel) { panel.classList.remove("open"); panel.setAttribute("aria-hidden", "true"); }
            if (overlay) { overlay.classList.remove("open"); }
        }

        window.__closeTeam = closeTeam;
        window.__closeSocials = closeSocials;

        /* ── Loading bar simulation ── */
        const fill = document.getElementById("loadingFill");
        const statusEl = document.getElementById("loadingStatus");
        const steps = [
            { pct: 8,  label: "Loading assets…" },
            { pct: 22, label: "Fetching player data…" },
            { pct: 40, label: "Streaming resources…" },
            { pct: 58, label: "Connecting to server…" },
            { pct: 74, label: "Verifying session…" },
            { pct: 88, label: "Almost there…" },
            { pct: 97, label: "Ready!" }
        ];
        let si = 0;

        function advanceLoader() {
            if (si >= steps.length) return;
            const s = steps[si++];
            fill.style.width = s.pct + "%";
            statusEl.textContent = s.label;
            const delay = 900 + Math.random() * 1400;
            setTimeout(advanceLoader, delay);
        }

        setTimeout(advanceLoader, 600);
    })();
    </script>

    <script src="index.js"></script>
</body>
</html>
