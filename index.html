<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Andreas Department of Justice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-dim: rgba(201, 168, 76, 0.10);
            --border: rgba(255, 255, 255, 0.07);
            --border-gold: rgba(201, 168, 76, 0.20);
            --navy: rgba(8, 14, 28, 0.60);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: #fff;
            cursor: default;
        }

        /* ── Background Video ── */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            z-index: 0;
        }

        /* Soft vignette — no glow, no gradient mesh, just darken edges */
        .screen-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                linear-gradient(to bottom,
                    rgba(0,0,0,0.40) 0%,
                    transparent 20%,
                    transparent 70%,
                    rgba(0,0,0,0.55) 100%
                );
            pointer-events: none;
        }

        /* ── Top Bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* SVG seal — no emoji */
        .brand-seal {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .brand-kicker {
            font-size: 9px;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.05px;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 13px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.38);
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
        }

        /* ── Left Buttons ── */
        .left-actions {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-btn {
            padding: 10px 18px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.48);
            color: rgba(255,255,255,0.82);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }

        .action-btn:hover {
            background: rgba(0,0,0,0.64);
            border-color: var(--border-gold);
            color: #fff;
        }

        .action-btn:active {
            background: rgba(0,0,0,0.72);
        }

        /* ── Socials Panel ── */
        .socials-panel {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%) translateX(-14px);
            width: 300px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.24s ease;
        }

        .socials-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0px);
        }

        .socials-shell {
            padding: 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(6, 10, 20, 0.86);
            box-shadow: 0 8px 32px rgba(0,0,0,0.52);
        }

        .socials-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .socials-kicker {
            font-size: 9px;
            color: var(--gold);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .socials-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        .panel-close-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.60);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .panel-close-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .socials-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .social-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px 13px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.75);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
        }

        .social-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--border-gold);
            color: #fff;
        }

        /* ── Team Overlay ── */
        .team-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.65);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.20s ease;
        }

        .team-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── Team Panel ── */
        .team-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(960px, calc(100vw - 60px));
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.98);
            transition: opacity 0.20s ease, transform 0.22s ease;
        }

        .team-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .panel-shell {
            padding: 24px 26px 20px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(6, 10, 20, 0.92);
            box-shadow: 0 20px 60px rgba(0,0,0,0.70);
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .panel-kicker {
            font-size: 9px;
            color: var(--gold);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .panel-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .panel-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.44);
            margin-top: 3px;
        }

        .panel-close {
            width: 34px;
            height: 34px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.65);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .panel-close:hover {
            background: rgba(255,255,255,0.09);
            color: #fff;
        }

        /* ── Team Stage (Carousel) ── */
        .team-stage {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            touch-action: none;
            cursor: grab;
        }

        .team-stage.dragging { cursor: grabbing; }

        .team-card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(300px, calc(100vw - 100px));
            height: 450px;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(10, 14, 26, 0.96);
            box-shadow: 0 10px 30px rgba(0,0,0,0.40);
            overflow: hidden;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        /* Gold accent top line on card */
        .team-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gold);
            opacity: 0.60;
        }

        .card-top {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .card-avatar {
            width: 62px;
            height: 62px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border-gold);
        }

        .card-head {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 2px;
        }

        .card-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-role {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }

        .card-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            color: rgba(255,255,255,0.50);
            padding: 3px 8px;
            border-radius: 3px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            letter-spacing: 0.3px;
        }

        .card-divider {
            position: relative;
            z-index: 2;
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin-bottom: 14px;
        }

        .card-bio {
            position: relative;
            z-index: 2;
            font-size: 13px;
            line-height: 1.65;
            color: rgba(255,255,255,0.68);
            margin-bottom: 16px;
            min-height: 80px;
        }

        .card-meta {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 14px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .meta-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--gold);
            opacity: 0.65;
        }

        .meta-value {
            font-size: 12px;
            color: rgba(255,255,255,0.80);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Team Controls ── */
        .team-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 12px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            border: 1px solid var(--border-gold);
            background: rgba(0,0,0,0.44);
            color: rgba(255,255,255,0.75);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .nav-btn:hover {
            background: rgba(201,168,76,0.10);
            color: #fff;
        }

        .nav-btn:active { opacity: 0.75; }

        .team-dots {
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 72px;
            justify-content: center;
        }

        .team-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        .team-dot.active {
            background: var(--gold);
            transform: scale(1.30);
        }

        /* ── Music UI ── */
        .music-ui {
            position: fixed;
            bottom: 20px;
            left: 24px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.58);
            box-shadow: 0 4px 18px rgba(0,0,0,0.40);
        }

        .music-cover {
            width: 42px;
            height: 42px;
            border-radius: 3px;
            object-fit: cover;
            border: 1px solid var(--border-gold);
            flex-shrink: 0;
        }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .music-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.6px;
            color: var(--gold);
            font-weight: 500;
        }

        .music-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .music-time {
            font-size: 11px;
            color: rgba(255,255,255,0.44);
        }

        .music-right {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-left: 6px;
        }

        .pause-btn {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.72);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
        }

        .pause-btn:hover {
            background: rgba(255,255,255,0.09);
            color: #fff;
        }

        .pause-btn.paused {
            color: var(--gold);
            border-color: var(--border-gold);
        }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vol-label {
            font-size: 10px;
            color: rgba(255,255,255,0.36);
            font-weight: 500;
            letter-spacing: 0.3px;
            min-width: 14px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            height: 3px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            cursor: pointer;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 11px;
            height: 11px;
            background: var(--gold);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        /* ── Loading Bar ── */
        .loading-wrap {
            position: fixed;
            bottom: 20px;
            right: 24px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .loading-status {
            font-size: 10px;
            letter-spacing: 1.1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.36);
            font-weight: 500;
        }

        .loading-track {
            width: 200px;
            height: 2px;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            border-radius: 999px;
            background: var(--gold);
            width: 0%;
            transition: width 0.30s ease;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="disp/loading_screen/video.mp4" type="video/mp4">
    </video>

    <audio id="bg-audio" autoplay loop preload="auto">
        <source src="disp/loading_screen/audio.mp3" type="audio/mpeg">
    </audio>

    <div class="screen-overlay"></div>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="brand">
            <!-- DOJ Seal SVG — clean, no emoji -->
            <svg class="brand-seal" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="SA-DOJ seal">
                <circle cx="19" cy="19" r="18" stroke="#c9a84c" stroke-width="1.2" fill="rgba(201,168,76,0.06)"/>
                <circle cx="19" cy="19" r="13" stroke="#c9a84c" stroke-width="0.7" stroke-dasharray="2 2" fill="none" opacity="0.5"/>
                <!-- Scales of justice -->
                <line x1="19" y1="10" x2="19" y2="28" stroke="#c9a84c" stroke-width="1.1"/>
                <line x1="12" y1="14" x2="26" y2="14" stroke="#c9a84c" stroke-width="1.1"/>
                <line x1="12" y1="14" x2="12" y2="19" stroke="#c9a84c" stroke-width="0.9"/>
                <line x1="26" y1="14" x2="26" y2="19" stroke="#c9a84c" stroke-width="0.9"/>
                <path d="M10 19 Q12 22 14 19" stroke="#c9a84c" stroke-width="0.9" fill="none"/>
                <path d="M24 19 Q26 22 28 19" stroke="#c9a84c" stroke-width="0.9" fill="none"/>
                <line x1="17" y1="28" x2="21" y2="28" stroke="#c9a84c" stroke-width="1.1"/>
            </svg>
            <div class="brand-text">
                <div class="brand-kicker">San Andreas</div>
                <div class="brand-name">Department of Justice</div>
            </div>
        </div>
        <div class="server-status">
            <div class="status-dot"></div>
            Server Online
        </div>
    </header>

    <!-- Left Actions -->
    <div class="left-actions">
        <button class="action-btn" id="socialsLaunch">Our Socials</button>
        <button class="action-btn" id="teamLaunch">Our Team</button>
    </div>

    <!-- Socials Panel -->
    <section id="socialsPanel" class="socials-panel" aria-hidden="true">
        <div class="socials-shell">
            <div class="socials-header">
                <div>
                    <div class="socials-kicker">SA-DOJ Networks</div>
                    <div class="socials-title">Our Socials</div>
                </div>
                <button class="panel-close-btn" id="socialsClose" aria-label="Close">&#215;</button>
            </div>
            <div class="socials-list">
                <button class="social-item" type="button" data-url="https://sadoj.net">SA-DOJ Website</button>
                <button class="social-item" type="button" data-url="https://discord.gg/sadoj">SA-DOJ Discord</button>
                <button class="social-item" type="button" data-url="https://www.youtube.com/@sadoj">SA-DOJ YouTube</button>
                <button class="social-item" type="button" data-url="https://www.tiktok.com/@sadoj">SA-DOJ TikTok</button>
            </div>
        </div>
    </section>

    <!-- Team Overlay -->
    <div class="team-overlay" id="teamOverlay"></div>

    <!-- Team Panel -->
    <section id="teamPanel" class="team-panel" aria-hidden="true">
        <div class="panel-shell">
            <div class="panel-header">
                <div>
                    <div class="panel-kicker">SA-DOJ Management</div>
                    <div class="panel-title">Our Team</div>
                    <div class="panel-sub">Meet the founding staff of San Andreas Department of Justice</div>
                </div>
                <button class="panel-close" id="teamClose" aria-label="Close">&#215;</button>
            </div>
            <div id="teamStage" class="team-stage"></div>
            <div class="team-controls">
                <button id="teamPrev" class="nav-btn" aria-label="Previous">&#8592;</button>
                <div id="teamDots" class="team-dots"></div>
                <button id="teamNext" class="nav-btn" aria-label="Next">&#8594;</button>
            </div>
        </div>
    </section>

    <!-- Music UI -->
    <div class="music-ui">
        <img class="music-cover" src="disp/loading_screen/cover.png" alt="Cover art" onerror="this.style.display='none'">
        <div class="music-info">
            <div class="music-label">Now Playing</div>
            <div class="music-title" id="musicTitle">Loading...</div>
            <div class="music-time" id="musicTime">--:--</div>
        </div>
        <div class="music-right">
            <button class="pause-btn" id="pauseBtn">Pause</button>
            <div class="volume-row">
                <span class="vol-label">VOL</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <!-- Loading Bar -->
    <div class="loading-wrap">
        <div class="loading-status" id="loadingStatus">Connecting...</div>
        <div class="loading-track">
            <div class="loading-fill" id="loadingFill"></div>
        </div>
    </div>

    <script>
    (function () {
        /* ── Video ── */
        var video = document.getElementById("bg-video");
        video.muted = true;
        video.play().catch(function () {
            document.addEventListener("click", function () {
                video.play().catch(function () {});
            }, { once: true });
        });

        /* ── Audio ── */
        var audio  = document.getElementById("bg-audio");
        var slider = document.getElementById("volumeSlider");
        var pauseBtn  = document.getElementById("pauseBtn");
        var titleEl   = document.getElementById("musicTitle");
        var timeEl    = document.getElementById("musicTime");

        audio.volume = 0.80;

        function fmt(s) {
            if (!isFinite(s)) return "--:--";
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        function refreshBtn() {
            if (audio.paused) {
                pauseBtn.textContent = "Play";
                pauseBtn.classList.add("paused");
            } else {
                pauseBtn.textContent = "Pause";
                pauseBtn.classList.remove("paused");
            }
        }

        audio.addEventListener("loadedmetadata", function () {
            var src  = audio.currentSrc || "";
            var name = src.split("/").pop().replace(/\.[^.]+$/, "").replace(/[-_]/g, " ");
            titleEl.textContent = name || "SA-DOJ Radio";
        });

        audio.addEventListener("timeupdate", function () {
            if (!isFinite(audio.duration)) return;
            timeEl.textContent = "Remaining: " + fmt(audio.duration - audio.currentTime);
        });

        audio.addEventListener("play",  refreshBtn);
        audio.addEventListener("pause", refreshBtn);
        audio.addEventListener("error", function () { titleEl.textContent = "SA-DOJ Radio"; });

        pauseBtn.addEventListener("click", function () {
            audio.paused ? audio.play().catch(function(){}) : audio.pause();
        });

        slider.addEventListener("input", function () {
            audio.volume = slider.value / 100;
        });

        refreshBtn();

        /* ── Socials Panel ── */
        var socialsLaunch = document.getElementById("socialsLaunch");
        var socialsPanel  = document.getElementById("socialsPanel");
        var socialsClose  = document.getElementById("socialsClose");

        function openSocials() {
            window.__closeTeam && window.__closeTeam();
            socialsPanel.classList.add("open");
            socialsPanel.setAttribute("aria-hidden", "false");
        }

        function closeSocials() {
            socialsPanel.classList.remove("open");
            socialsPanel.setAttribute("aria-hidden", "true");
        }

        socialsLaunch.addEventListener("click", function () {
            socialsPanel.classList.contains("open") ? closeSocials() : openSocials();
        });

        socialsClose.addEventListener("click", closeSocials);

        document.querySelectorAll(".social-item").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var url = btn.getAttribute("data-url");
                if (!url) return;
                var a = document.createElement("a");
                a.href = url;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });

        window.__closeSocials = closeSocials;

        /* ── Loading Bar ── */
        var fill   = document.getElementById("loadingFill");
        var status = document.getElementById("loadingStatus");
        var steps  = [
            { p: 10, t: "Loading assets..." },
            { p: 25, t: "Fetching player data..." },
            { p: 42, t: "Streaming resources..." },
            { p: 60, t: "Connecting to server..." },
            { p: 76, t: "Verifying session..." },
            { p: 90, t: "Almost ready..." },
            { p: 98, t: "Ready!" }
        ];
        var si = 0;

        function advance() {
            if (si >= steps.length) return;
            var s = steps[si++];
            fill.style.width  = s.p + "%";
            status.textContent = s.t;
            setTimeout(advance, 900 + Math.random() * 1200);
        }

        setTimeout(advance, 700);
    })();
    </script>

    <script src="index.js"></script>
</body>
</html>
